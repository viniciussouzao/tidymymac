name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }} --force

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install deps
        run: go mod download

      - name: Build darwin/amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-X github.com/viniciussouzao/tidymymac/internal/buildinfo.Version=${{ steps.version.outputs.version }} \
                      -X github.com/viniciussouzao/tidymymac/internal/buildinfo.Commit=${{ github.sha }} \
                      -X github.com/viniciussouzao/tidymymac/internal/buildinfo.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/tidymymac-darwin-amd64 \
            ./cmd/tidymymac/

      - name: Build darwin/arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-X github.com/viniciussouzao/tidymymac/internal/buildinfo.Version=${{ steps.version.outputs.version }} \
                      -X github.com/viniciussouzao/tidymymac/internal/buildinfo.Commit=${{ github.sha }} \
                      -X github.com/viniciussouzao/tidymymac/internal/buildinfo.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/tidymymac-darwin-arm64 \
            ./cmd/tidymymac/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
          make_latest: true
